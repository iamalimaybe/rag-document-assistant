name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rag_document_assistant
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U rag_user -d rag_document_assistant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run backend tests
        run: ./mvnw test